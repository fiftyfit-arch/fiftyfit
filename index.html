<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FiftyFit">
<meta name="theme-color" content="#E8622A">
<title>FiftyFit 나의 운동기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #E8622A;
    --orange-light: #FFF0E8;
    --dark: #1C1C1E;
    --gray: #8E8E93;
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --border: #E5E5EA;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* HEADER */
  .header {
    background: var(--orange);
    color: #fff;
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(232,98,42,0.35);
  }
  .header-back {
    background: none; border: none; color: #fff;
    font-size: 22px; cursor: pointer; padding: 0 6px 0 0;
    display: none;
  }
  .header-icon { font-size: 26px; line-height: 1; }
  .header-title { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }
  .header-right { margin-left: auto; }
  .header-btn {
    background: rgba(255,255,255,0.22); border: none; color: #fff;
    border-radius: 20px; padding: 7px 15px; font-size: 13px;
    cursor: pointer; font-weight: 700; font-family: inherit;
  }

  /* PAGES */
  .page { display: none; padding: 20px 16px 100px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card); border-radius: 16px;
    padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  }
  .card-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  /* WELCOME */
  .welcome-hero {
    text-align: center; padding: 32px 20px 24px;
  }
  .welcome-hero .emoji { font-size: 64px; display: block; margin-bottom: 16px; }
  .welcome-hero h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px; }
  .welcome-hero p { color: var(--gray); font-size: 14px; line-height: 1.6; }
  .name-input-wrap { margin-top: 24px; }
  .name-input-wrap label { display: block; font-size: 13px; font-weight: 700; color: var(--gray); margin-bottom: 8px; }
  .name-input {
    width: 100%; border: 2px solid var(--border); border-radius: 12px;
    padding: 13px 14px; font-size: 16px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
    background: #FAFAFA; color: var(--dark);
  }
  .name-input:focus { border-color: var(--orange); }

  /* BUTTONS */
  .btn-primary {
    width: 100%; background: var(--orange); color: #fff;
    border: none; border-radius: 14px; padding: 16px;
    font-size: 16px; font-weight: 900; cursor: pointer;
    font-family: inherit; letter-spacing: -0.3px;
    box-shadow: 0 4px 16px rgba(232,98,42,0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 12px;
  }
  .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(232,98,42,0.25); }
  .btn-secondary {
    background: var(--orange-light); color: var(--orange);
    border: none; border-radius: 10px; padding: 8px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit;
  }
  .btn-danger {
    width: 100%; background: #FF3B30; color: #fff;
    border: none; border-radius: 14px; padding: 15px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; margin-top: 8px; opacity: 0.9;
  }

  /* HOME */
  .greeting { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
  .greeting span { color: var(--orange); }
  .greeting-sub { font-size: 14px; color: var(--gray); margin-bottom: 20px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card); border-radius: 14px; padding: 16px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.07); text-align: center;
  }
  .stat-emoji { font-size: 22px; }
  .stat-value { font-size: 24px; font-weight: 900; color: var(--orange); margin-top: 4px; }
  .stat-label { font-size: 11px; color: var(--gray); margin-top: 2px; }

  .month-selector { display: flex; gap: 10px; margin-bottom: 16px; }
  .month-select {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    outline: none; background: var(--card); color: var(--dark);
  }

  .recent-title { font-size: 13px; color: var(--gray); font-weight: 700; margin-bottom: 10px; }
  .record-item {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: transform 0.1s;
  }
  .record-item:active { transform: scale(0.99); }
  .record-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--orange-light); display: flex;
    align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .record-name { font-weight: 700; font-size: 15px; }
  .record-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .record-arrow { color: #C7C7CC; font-size: 20px; margin-left: auto; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--gray); }
  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  /* RECORD FORM */
  .form-section-title {
    font-size: 13px; font-weight: 700; color: var(--gray);
    margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field-card {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .field-label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--gray); margin-bottom: 8px;
  }
  .field-row { display: flex; align-items: center; gap: 8px; }
  .field-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    outline: none; background: #FAFAFA; color: var(--dark);
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--orange); }
  .field-unit { color: var(--gray); font-size: 14px; font-weight: 700; min-width: 24px; }

  /* BAND PICKER */
  .band-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .band-btn {
    border: 2px solid transparent; border-radius: 20px;
    padding: 7px 15px; font-size: 13px; cursor: pointer;
    font-weight: 700; font-family: inherit;
    transition: all 0.15s;
  }
  .band-btn.selected {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--orange);
    border-color: var(--dark);
  }

  /* DETAIL */
  .detail-header {
    background: var(--orange); border-radius: 16px; padding: 20px;
    color: #fff; margin-bottom: 16px;
  }
  .detail-period { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
  .detail-name { font-size: 22px; font-weight: 900; }
  .detail-row {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .detail-ex { font-size: 14px; color: var(--dark); }
  .detail-val { font-weight: 900; font-size: 17px; color: var(--orange); }
  .band-chip {
    border-radius: 20px; padding: 5px 14px;
    font-size: 13px; font-weight: 700;
  }

  /* HISTORY */
  .month-group-title {
    font-size: 13px; color: var(--orange); font-weight: 900;
    margin: 16px 0 8px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; padding: 10px 0 20px; z-index: 100;
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--gray); font-size: 11px; font-family: inherit; font-weight: 400;
    padding: 0; transition: color 0.15s;
  }
  .nav-btn.active { color: var(--orange); font-weight: 700; }
  .nav-icon { font-size: 22px; }

  /* SAVED TOAST */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: #16A34A; color: #fff; border-radius: 20px;
    padding: 10px 24px; font-size: 14px; font-weight: 700;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .page-title { font-size: 17px; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.3px; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast">✅ 저장 완료!</div>

<!-- HEADER -->
<header class="header">
  <button class="header-back" id="backBtn" onclick="goBack()">←</button>
  <div class="header-icon">🏋️</div>
  <div>
    <div class="header-title">FiftyFit</div>
    <div class="header-sub">나의 운동 기록 모음</div>
  </div>
  <div class="header-right" id="headerRight">
    <button class="header-btn" onclick="showPage('history')">기록 보기</button>
  </div>
</header>

<!-- PAGE: WELCOME (최초 이름 설정) -->
<div class="page active" id="page-welcome">
  <div class="welcome-hero">
    <span class="emoji">🏋️</span>
    <h2>FiftyFit에 오신 것을<br>환영해요!</h2>
    <p>운동 기록을 쉽게 저장하고<br>나의 성장을 확인하세요.</p>
    <div class="name-input-wrap">
      <label>내 이름 또는 별명을 입력해주세요</label>
      <input class="name-input" id="welcomeName" type="text" placeholder="예: 홍길동, 운동왕" maxlength="10">
    </div>
    <button class="btn-primary" onclick="setName()">시작하기 →</button>
  </div>
</div>

<!-- PAGE: HOME -->
<div class="page" id="page-home">
  <div class="greeting" id="greetingText"></div>
  <div class="greeting-sub">오늘도 파이팅이에요! 💪</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-emoji">📋</div>
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">총 기록 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">🔥</div>
      <div class="stat-value" id="streakCount">0</div>
      <div class="stat-label">연속 월 기록</div>
    </div>
  </div>

  <div class="month-selector">
    <select class="month-select" id="yearSelect"></select>
    <select class="month-select" id="monthSelect"></select>
  </div>

  <button class="btn-primary" id="recordBtn" onclick="startRecord()">✏️ 기록 입력하기</button>

  <div style="margin-top: 24px;">
    <div class="recent-title">최근 기록</div>
    <div id="recentList"></div>
  </div>
</div>

<!-- PAGE: RECORD FORM -->
<div class="page" id="page-record">
  <div class="page-title" id="formTitle"></div>

  <div class="form-section-title">무게 기록</div>

  <div class="field-card">
    <label class="field-label">🏋️ 고블릿 스쿼트</label>
    <div class="field-row">
      <input class="field-input" id="f_goblet" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>
  <div class="field-card">
    <label class="field-label">⚡ 데드리프트</label>
    <div class="field-row">
      <input class="field-input" id="f_deadlift" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>
  <div class="field-card">
    <label class="field-label">🔄 스윙</label>
    <div class="field-row">
      <input class="field-input" id="f_swing" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>
  <div class="field-card">
    <label class="field-label">🚶 파머스워크</label>
    <div class="field-row">
      <input class="field-input" id="f_farmers" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>
  <div class="field-card">
    <label class="field-label">💪 풀오버</label>
    <div class="field-row">
      <input class="field-input" id="f_pullover" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>
  <div class="field-card">
    <label class="field-label">🙌 원암 오버헤드프레스</label>
    <div class="field-row">
      <input class="field-input" id="f_ohp" type="number" min="0" step="0.5" placeholder="0">
      <span class="field-unit">kg</span>
    </div>
  </div>

  <div class="form-section-title">풀업 밴드</div>
  <div class="field-card">
    <label class="field-label">🎗️ 풀업 밴드 색</label>
    <div class="band-options" id="bandOptions"></div>
  </div>

  <div class="form-section-title">기타</div>
  <div id="otherList"></div>
  <button type="button" onclick="addOtherExercise()" style="width:100%;background:#FFF0E8;color:#E8622A;border:1.5px dashed #E8622A;border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;">+ 기타 운동 추가</button>

  <button class="btn-primary" onclick="saveRecord()">💾 저장하기</button>
</div>

<!-- PAGE: DETAIL -->
<div class="page" id="page-detail">
  <div id="detailContent"></div>
</div>

<!-- PAGE: HISTORY -->
<div class="page" id="page-history">
  <div class="page-title">전체 기록</div>
  <div id="historyList"></div>
</div>

<!-- BOTTOM NAV (record 페이지에서는 숨김) -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
    <span class="nav-icon">🏠</span>홈
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')">
    <span class="nav-icon">📋</span>전체기록
  </button>
  <button class="nav-btn" id="nav-settings" onclick="showSettings()">
    <span class="nav-icon">⚙️</span>설정
  </button>
</nav>

<script>
const BAND_COLORS = [
  { label: "노랑", bg: "#FFD700", text: "#333" },
  { label: "빨강", bg: "#E8363A", text: "#fff" },
  { label: "파랑", bg: "#2563EB", text: "#fff" },
  { label: "초록", bg: "#16A34A", text: "#fff" },
  { label: "보라", bg: "#7C3AED", text: "#fff" },
  { label: "검정", bg: "#1a1a1a", text: "#fff" },
  { label: "회색", bg: "#9CA3AF", text: "#fff" },
];

const EXERCISES = [
  { id: "goblet", label: "고블릿 스쿼트", icon: "🏋️" },
  { id: "deadlift", label: "데드리프트", icon: "⚡" },
  { id: "swing", label: "스윙", icon: "🔄" },
  { id: "farmers", label: "파머스워크", icon: "🚶" },
  { id: "pullover", label: "풀오버", icon: "💪" },
  { id: "ohp", label: "원암 오버헤드프레스", icon: "🙌" },
];

let currentPage = "welcome";
let pageStack = [];
let editingYear = null;
let editingMonth = null;
let selectedBand = "";
let otherExercises = [];

function getRecords() {
  try { return JSON.parse(localStorage.getItem("ff_records") || "[]"); } catch { return []; }
}
function saveRecords(r) { localStorage.setItem("ff_records", JSON.stringify(r)); }
function getName() { return localStorage.getItem("ff_name") || ""; }
function setNameLS(n) { localStorage.setItem("ff_name", n); }

// ── INIT ──
(function init() {
  buildYearMonth();
  buildBandOptions();

  const name = getName();
  if (!name) {
    showPage("welcome", true);
  } else {
    showPage("home", true);
    refreshHome();
  }
})();

function buildYearMonth() {
  const now = new Date();
  const ySel = document.getElementById("yearSelect");
  const mSel = document.getElementById("monthSelect");
  for (let y = 2023; y <= 2030; y++) {
    const o = document.createElement("option");
    o.value = y; o.textContent = y + "년";
    if (y === now.getFullYear()) o.selected = true;
    ySel.appendChild(o);
  }
  ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"].forEach((m, i) => {
    const o = document.createElement("option");
    o.value = i + 1; o.textContent = m;
    if (i + 1 === now.getMonth() + 1) o.selected = true;
    mSel.appendChild(o);
  });
}

function buildBandOptions() {
  const wrap = document.getElementById("bandOptions");
  wrap.innerHTML = "";
  [...BAND_COLORS, { label: "없음", bg: "#F2F2F7", text: "#666" }].forEach(b => {
    const btn = document.createElement("button");
    btn.className = "band-btn";
    btn.textContent = b.label;
    btn.style.background = b.bg;
    btn.style.color = b.text;
    btn.onclick = () => {
      selectedBand = b.label === "없음" ? "" : b.label;
      document.querySelectorAll(".band-btn").forEach(x => x.classList.remove("selected"));
      btn.classList.add("selected");
    };
    wrap.appendChild(btn);
  });
}

// ── NAVIGATION ──
function showPage(id, replace = false) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + id).classList.add("active");

  const backBtn = document.getElementById("backBtn");
  const bottomNav = document.getElementById("bottomNav");
  const headerRight = document.getElementById("headerRight");

  if (!replace) pageStack.push(currentPage);
  currentPage = id;

  // Back button
  backBtn.style.display = (id === "home" || id === "welcome") ? "none" : "block";

  // Bottom nav
  bottomNav.style.display = (id === "record" || id === "welcome") ? "none" : "flex";

  // Header right
  headerRight.style.display = (id === "welcome" || id === "record") ? "none" : "block";
  if (id === "home") {
    headerRight.innerHTML = `<button class="header-btn" onclick="showPage('history')">기록 보기</button>`;
  } else if (id === "detail") {
    headerRight.innerHTML = `<button class="header-btn" onclick="editCurrentDetail()">수정</button>`;
  } else {
    headerRight.innerHTML = "";
  }

  // Nav active state
  ["home","history","settings"].forEach(n => {
    const el = document.getElementById("nav-" + n);
    if (el) el.classList.toggle("active", id === n);
  });

  if (id === "home") refreshHome();
  if (id === "history") renderHistory();
}

function goBack() {
  const prev = pageStack.pop() || "home";
  showPage(prev, true);
}

// ── WELCOME ──
function setName() {
  const n = document.getElementById("welcomeName").value.trim();
  if (!n) { alert("이름을 입력해주세요!"); return; }
  setNameLS(n);
  showPage("home", true);
  refreshHome();
}

// ── HOME ──
function refreshHome() {
  const name = getName();
  document.getElementById("greetingText").innerHTML = `안녕하세요, <span>${name}</span>님! 👋`;

  const records = getRecords();
  document.getElementById("totalCount").textContent = records.length;

  // Streak: consecutive months with records, going back from now
  const now = new Date();
  let streak = 0;
  let y = now.getFullYear(), m = now.getMonth() + 1;
  while (true) {
    if (records.find(r => r.year === y && r.month === m)) {
      streak++;
      m--; if (m === 0) { m = 12; y--; }
    } else break;
    if (streak > 24) break;
  }
  document.getElementById("streakCount").textContent = streak;

  // Update record button label
  const selY = +document.getElementById("yearSelect").value;
  const selM = +document.getElementById("monthSelect").value;
  const existing = records.find(r => r.year === selY && r.month === selM);
  document.getElementById("recordBtn").textContent = existing
    ? `✏️ ${selY}년 ${selM}월 기록 수정`
    : `✏️ ${selY}년 ${selM}월 기록 입력`;

  // Recent
  const list = document.getElementById("recentList");
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">📝</span>아직 기록이 없어요<br>첫 기록을 입력해보세요!</div>`;
    return;
  }
  const sorted = [...records].sort((a, b) => (b.year*100+b.month) - (a.year*100+a.month));
  list.innerHTML = sorted.slice(0, 4).map(r => recordItemHTML(r)).join("");
}

// Update button when date changes
document.getElementById("yearSelect").addEventListener("change", refreshHome);
document.getElementById("monthSelect").addEventListener("change", refreshHome);

function recordItemHTML(r) {
  const filled = ["goblet","deadlift","swing","farmers","pullover","ohp","band","other"].filter(k => r[k]).length;
  return `<div class="record-item" onclick="showDetail(${r.year},${r.month})">
    <div class="record-icon">🏋️</div>
    <div>
      <div class="record-name">${r.year}년 ${r.month}월</div>
      <div class="record-meta">기록 ${filled}개${r.band ? " · 밴드 " + r.band : ""}</div>
    </div>
    <div class="record-arrow">›</div>
  </div>`;
}

// ── RECORD FORM ──
function addOtherExercise(label = "", kg = "") {
  const idx = otherExercises.length;
  otherExercises.push({});
  const wrap = document.createElement("div");
  wrap.className = "field-card";
  wrap.id = "otherItem_" + idx;
  wrap.style.marginBottom = "10px";
  wrap.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <label class="field-label" style="margin:0;">📌 기타 운동 ${idx+1}</label>
      <button onclick="removeOtherExercise(${idx})" style="background:none;border:none;color:#FF3B30;font-size:18px;cursor:pointer;padding:0;">✕</button>
    </div>
    <input class="field-input" id="f_otherLabel_${idx}" type="text" placeholder="운동 이름" style="margin-bottom:8px;" value="${label}">
    <div class="field-row">
      <input class="field-input" id="f_other_${idx}" type="number" min="0" step="0.5" placeholder="0" value="${kg}">
      <span class="field-unit">kg</span>
    </div>
  `;
  document.getElementById("otherList").appendChild(wrap);
}

function removeOtherExercise(idx) {
  // 현재 입력값 수집 후 해당 항목 제외하고 재렌더
  const current = otherExercises.map((_, i) => ({
    label: document.getElementById("f_otherLabel_" + i)?.value || "",
    kg: document.getElementById("f_other_" + i)?.value || ""
  }));
  current.splice(idx, 1);
  otherExercises = [];
  document.getElementById("otherList").innerHTML = "";
  if (current.length === 0) {
    addOtherExercise();
  } else {
    current.forEach(ex => addOtherExercise(ex.label, ex.kg));
  }
}

function startRecord() {
  editingYear = +document.getElementById("yearSelect").value;
  editingMonth = +document.getElementById("monthSelect").value;

  document.getElementById("formTitle").textContent = `${editingYear}년 ${editingMonth}월 운동기록`;

  // Fill existing or clear
  const records = getRecords();
  const existing = records.find(r => r.year === editingYear && r.month === editingMonth);
  const d = existing || {};

  ["goblet","deadlift","swing","farmers","pullover","ohp"].forEach(k => {
    const el = document.getElementById("f_" + k);
    if (el) el.value = d[k] || "";
  });
  // 기타 운동 복원
  otherExercises = [];
  document.getElementById("otherList").innerHTML = "";
  if (d.extras && d.extras.length > 0) {
    d.extras.forEach(ex => addOtherExercise(ex.label, ex.kg));
  } else {
    addOtherExercise();
  }

  // Band
  selectedBand = d.band || "";
  document.querySelectorAll(".band-btn").forEach(btn => {
    btn.classList.toggle("selected",
      (selectedBand === "" && btn.textContent === "없음") ||
      btn.textContent === selectedBand
    );
  });

  showPage("record");
}

const SHEET_URL = "https://script.google.com/macros/s/AKfycbz0CjUzOzg_YM71M1spOznXlfrxJjQjEav6FucP69yfqJmV5XJyWSsnuU13UWlMeV4N/exec";

function saveRecord() {
  const records = getRecords();
  const idx = records.findIndex(r => r.year === editingYear && r.month === editingMonth);
  const entry = {
    year: editingYear, month: editingMonth,
    name: getName(),
    goblet: document.getElementById("f_goblet").value,
    deadlift: document.getElementById("f_deadlift").value,
    swing: document.getElementById("f_swing").value,
    farmers: document.getElementById("f_farmers").value,
    pullover: document.getElementById("f_pullover").value,
    ohp: document.getElementById("f_ohp").value,
    band: selectedBand,
    extras: otherExercises.map((_, i) => ({
      label: document.getElementById("f_otherLabel_" + i)?.value || "",
      kg: document.getElementById("f_other_" + i)?.value || ""
    })).filter(e => e.label || e.kg),
    savedAt: new Date().toISOString(),
  };
  if (idx >= 0) records[idx] = entry;
  else records.push(entry);
  saveRecords(records);

  // extras를 시트용 문자열로 변환
  const sheetEntry = { ...entry };
  if (entry.extras && entry.extras.length > 0) {
    sheetEntry.other = entry.extras.map(e => e.label + (e.kg ? ":" + e.kg + "kg" : "")).join(", ");
    sheetEntry.otherLabel = "";
  }

  // 구글 시트에 전송
  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(sheetEntry),
  }).catch(() => {});

  showToast("✅ 저장 완료!");
  setTimeout(() => showPage("home"), 800);
}

// ── DETAIL ──
let detailYear = null, detailMonth = null;

function showDetail(y, m) {
  detailYear = y; detailMonth = m;
  const records = getRecords();
  const r = records.find(r => r.year === y && r.month === m);
  if (!r) return;

  const exRows = EXERCISES.map(ex => r[ex.id]
    ? `<div class="detail-row"><span class="detail-ex">${ex.icon} ${ex.label}</span><span class="detail-val">${r[ex.id]} kg</span></div>`
    : ""
  ).join("");

  const bandColor = BAND_COLORS.find(b => b.label === r.band);
  const bandRow = r.band
    ? `<div class="detail-row"><span class="detail-ex">🎗️ 풀업 밴드 색</span>
        <span class="band-chip" style="background:${bandColor?.bg||'#eee'};color:${bandColor?.text||'#333'}">${r.band}</span></div>`
    : "";
  const extrasRows = (r.extras || []).filter(e => e.label || e.kg).map(e =>
    `<div class="detail-row"><span class="detail-ex">📌 ${e.label || "기타"}</span><span class="detail-val">${e.kg ? e.kg + " kg" : ""}</span></div>`
  ).join("");
  // 구버전 호환
  const legacyRow = (!r.extras && r.other)
    ? `<div class="detail-row"><span class="detail-ex">📌 ${r.otherLabel || "기타"}</span><span class="detail-val">${r.other} kg</span></div>`
    : "";

  document.getElementById("detailContent").innerHTML = `
    <div class="detail-header">
      <div class="detail-period">${y}년 ${m}월</div>
      <div class="detail-name">${getName()}님의 기록</div>
    </div>
    ${exRows}${bandRow}${extrasRows}${legacyRow}
    <button class="btn-danger" onclick="deleteRecord(${y},${m})">🗑️ 기록 삭제</button>
  `;
  showPage("detail");
}

function editCurrentDetail() {
  if (!detailYear) return;
  editingYear = detailYear;
  editingMonth = detailMonth;
  document.getElementById("yearSelect").value = editingYear;
  document.getElementById("monthSelect").value = editingMonth;
  startRecord();
}

function deleteRecord(y, m) {
  if (!confirm("이 기록을 삭제할까요?")) return;
  const records = getRecords().filter(r => !(r.year === y && r.month === m));
  saveRecords(records);
  showPage("home");
}

// ── HISTORY ──
function renderHistory() {
  const records = getRecords();
  const list = document.getElementById("historyList");
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">📋</span>아직 기록이 없어요</div>`;
    return;
  }
  const sorted = [...records].sort((a, b) => (b.year*100+b.month) - (a.year*100+a.month));
  list.innerHTML = sorted.map(r => `
    <div class="month-group-title">${r.year}년 ${r.month}월</div>
    ${recordItemHTML(r)}
  `).join("");
}

// ── SETTINGS ──
function showSettings() {
  const name = getName();
  const newName = prompt(`현재 이름: ${name}\n새 이름을 입력하세요 (취소하면 유지):`);
  if (newName && newName.trim()) {
    setNameLS(newName.trim());
    refreshHome();
    alert("이름이 변경되었어요!");
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
</script>
